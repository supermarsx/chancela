name: docs

# Build the MkDocs Material documentation site and deploy it to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements-docs.in
            requirements-docs.txt

      - name: Verify documentation dependency lock
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip==26.1.2
          python -m pip install --disable-pip-version-check pip-tools==7.5.3
          pip-compile --generate-hashes --strip-extras --resolver=backtracking \
            --output-file=requirements-docs.txt requirements-docs.in
          git diff --exit-code -- requirements-docs.txt

      - name: Install locked dependencies
        run: pip install --require-hashes -r requirements-docs.txt

      - name: Build site (strict)
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

name: CI

on:
  workflow_dispatch:
    inputs:
      enforce_security_scans:
        description: Fail report-only dependency/image vulnerability scans when they return findings or errors.
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Metadata: cheap release metadata guard that fails before heavier builds.
  # ---------------------------------------------------------------------------
  metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check release versions
        run: npm run check:versions

      - name: Check spec coverage tracker
        run: npm run check:spec-coverage

      - name: Check live-provider assurance gates
        run: npm run check:live-provider-assurance

      - name: Check encrypted build defaults
        run: npm run check:encrypted-build-defaults

      - name: Check release trust validator fixtures
        run: node scripts/check-release-trust.mjs self-test

      - name: Check SBOM package linkage fixtures
        run: node scripts/release-supply-chain.mjs self-test

      - name: Check package provenance fixtures
        run: node scripts/check-package-artifacts.mjs --fixture --skip-dist

  # ---------------------------------------------------------------------------
  # Supply chain: deterministic lockfile SBOM plus advisory reports. SBOM
  # generation/check is enforced; vulnerability reports are report-only by
  # default and become blocking only for manual runs with enforce_security_scans.
  # Cargo audit is heavier, so PRs run it only when labeled run-security-scans.
  # ---------------------------------------------------------------------------
  supply-chain:
    name: Supply chain reports
    runs-on: ubuntu-latest
    env:
      SECURITY_SCAN_ENFORCED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce_security_scans == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate dependency SBOM
        run: |
          mkdir -p dist/supply-chain
          node scripts/release-supply-chain.mjs sbom --output dist/supply-chain/chancela-dependency-sbom.cdx.json
          node scripts/release-supply-chain.mjs check --input dist/supply-chain/chancela-dependency-sbom.cdx.json

      - name: npm production vulnerability audit (report)
        id: npm-audit
        shell: bash
        run: |
          set +e
          npm audit --omit=dev --audit-level=high --json > dist/supply-chain/npm-audit-prod.json
          status=$?
          set -e

          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -eq 0 ]; then
            echo "npm production audit did not report high/critical findings." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "npm production audit returned status $status; see uploaded report artifact." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$SECURITY_SCAN_ENFORCED" = "true" ] && [ "$status" -ne 0 ]; then
            exit "$status"
          fi

      - name: Cargo advisory audit (report)
        id: cargo-audit
        if: >-
          github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'pull_request' &&
           contains(github.event.pull_request.labels.*.name, 'run-security-scans'))
        shell: bash
        run: |
          set -euo pipefail
          status=0

          if ! cargo audit --version >/dev/null 2>&1; then
            set +e
            cargo install cargo-audit --locked
            install_status=$?
            set -e
            if [ "$install_status" -ne 0 ]; then
              status="$install_status"
              cat > dist/supply-chain/cargo-audit.json <<JSON
          {
            "status": "skipped",
            "reason": "cargo-audit could not be installed in this CI run",
            "installExitCode": $install_status
          }
          JSON
              echo "cargo-audit install failed with status $install_status; see uploaded report artifact." >> "$GITHUB_STEP_SUMMARY"
              echo "status=$status" >> "$GITHUB_OUTPUT"
              if [ "$SECURITY_SCAN_ENFORCED" = "true" ]; then
                exit "$status"
              fi
              exit 0
            fi
          fi

          set +e
          cargo audit --json > dist/supply-chain/cargo-audit.json
          status=$?
          set -e

          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -eq 0 ]; then
            echo "cargo audit completed without advisory failures." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "cargo audit returned status $status; see uploaded report artifact." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$SECURITY_SCAN_ENFORCED" = "true" ] && [ "$status" -ne 0 ]; then
            exit "$status"
          fi

      - name: Upload supply chain reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chancela-supply-chain-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/supply-chain/
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Rust: format, lint (deny warnings) and test on all three desktop platforms.
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # chancela-smartcard links libpcsclite via the pcsc crate; Linux needs the
      # dev headers + daemon (Windows uses WinSCard, macOS the PCSC framework).
      - name: Install PC/SC system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev pcscd

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

  # ---------------------------------------------------------------------------
  # SQLCipher: compile and run the opt-in encrypted-store tests on Windows with
  # a native Win32 Perl pinned ahead of vendored OpenSSL's build. Without this,
  # openssl-src may discover an incompatible Unix/Cygwin perl.exe first.
  # ---------------------------------------------------------------------------
  sqlcipher:
    name: SQLCipher feature (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install native Perl for vendored OpenSSL
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install strawberryperl --version=5.40.4.1 --no-progress --yes

          $perlBin = 'C:\Strawberry\perl\bin'
          $cBin = 'C:\Strawberry\c\bin'
          if (-not (Test-Path (Join-Path $perlBin 'perl.exe'))) {
            throw "Pinned Strawberry Perl was not installed at $perlBin"
          }

          "$perlBin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          "$cBin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          "PERL=$perlBin\perl.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          $env:Path = "$perlBin;$cBin;$env:Path"
          perl -MConfig -e 'print qq(perl=$^X\narch=$Config{archname}\nversion=$]\n)'

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run SQLCipher feature tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $perl = (Get-Command perl -ErrorAction Stop).Source
          if ($perl -notlike 'C:\Strawberry\perl\bin\perl.exe') {
            throw "Expected Strawberry Perl first on PATH, got $perl"
          }
          cargo test -p chancela-store --locked --features sqlcipher sqlcipher

  # ---------------------------------------------------------------------------
  # Web: format, lint, test and build the @chancela/web workspace on supported
  # Node LTS, using the committed root npm lockfile.
  # ---------------------------------------------------------------------------
  web:
    name: Web (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Install Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format check
        run: npm run format:check --workspace apps/web

      - name: Lint
        run: npm run lint --workspace apps/web

      - name: Test with coverage thresholds
        run: npm run test:coverage --workspace apps/web

      - name: Build
        run: npm run build --workspace apps/web

  # ---------------------------------------------------------------------------
  # Recent landed checkpoint: focused regression lane for areas that landed in
  # parallel and are easy to miss in broad jobs: API paper import,
  # archive-package evidence including /DocTimeStamp, local PKCS#12 signing,
  # bounded retention, data key preflight, TSL hardening, MCP resources/prompts,
  # web contract/dashboard/signing/template/i18n pins, static browser E2E markers,
  # validator corpus manifest integrity, and desktop Cargo.lock resolution.
  # ---------------------------------------------------------------------------
  recent-landed:
    name: Recent landed checkpoint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PC/SC system deps (Linux)
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev pcscd

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run recent landed checkpoint
        run: npm run test:checkpoint:recent-landed

  # ---------------------------------------------------------------------------
  # Docker: prove the server image builds and boots with durable persistence.
  # Kept off pull requests (the release build is slow) so PR feedback stays
  # fast; it gates pushes to main and can be run manually. No push.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker build + smoke (server)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    env:
      SECURITY_SCAN_ENFORCED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce_security_scans == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Docker metadata
        id: docker-meta
        shell: bash
        run: |
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build server image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.server
          push: false
          load: true
          tags: chancela-server:ci
          labels: |
            org.opencontainers.image.title=Chancela server
            org.opencontainers.image.description=Chancela self-hosted server CI image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.docker-meta.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke server container
        shell: bash
        run: |
          set -euo pipefail

          data_dir="$(mktemp -d)"
          chmod 777 "$data_dir"
          container=""

          cleanup() {
            local status=$?
            if [ "$status" -ne 0 ] && [ -n "$container" ]; then
              docker logs "$container" || true
            fi
            if [ -n "$container" ]; then
              docker rm -f "$container" >/dev/null 2>&1 || true
            fi
            rm -rf "$data_dir"
          }
          trap cleanup EXIT

          container="$(docker run -d \
            --name "chancela-server-ci-${{ github.run_id }}-${{ github.run_attempt }}" \
            -p 127.0.0.1::8080 \
            -e CHANCELA_DATA_DIR=/data \
            -v "$data_dir:/data" \
            chancela-server:ci)"

          mapped="$(docker port "$container" 8080/tcp)"
          health_url="http://${mapped}/health"
          body=""

          for _ in {1..60}; do
            if body="$(curl -fsS "$health_url")"; then
              break
            fi
            sleep 1
          done

          if [ -z "$body" ]; then
            echo "server did not become healthy at $health_url" >&2
            exit 1
          fi

          printf '%s\n' "$body"
          HEALTH_BODY="$body" python3 - <<'PY'
          import json
          import os
          import sys

          health = json.loads(os.environ["HEALTH_BODY"])
          checks = {
              "status": health.get("status") == "ok",
              "persistent": health.get("persistent") is True,
              "ledger_verified": health.get("ledger_verified") is True,
              "store_schema_version": isinstance(health.get("store_schema_version"), int),
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit(f"health smoke failed {failed}: {health!r}")
          PY

      - name: Collect Docker image metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/docker-security
          docker image inspect chancela-server:ci > dist/docker-security/chancela-server-image-inspect.json

      - name: Generate Docker image SBOM (report)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/docker-security
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/dist/docker-security:/out" \
            anchore/syft:v1.9.0 \
            chancela-server:ci \
            -o cyclonedx-json=/out/chancela-server-image-sbom.cdx.json

      - name: Scan Docker image vulnerabilities (report)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/docker-security
          exit_code=0
          if [ "$SECURITY_SCAN_ENFORCED" = "true" ]; then
            exit_code=1
          fi
          set +e
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/dist/docker-security:/out" \
            aquasec/trivy:0.54.1 \
            image \
            --exit-code "$exit_code" \
            --format json \
            --output /out/chancela-server-trivy-high-critical.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            chancela-server:ci
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Docker image vulnerability scan completed; see uploaded report artifact." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Docker image vulnerability scan returned status $status; see uploaded report artifact." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$SECURITY_SCAN_ENFORCED" = "true" ] && [ "$status" -ne 0 ]; then
            exit "$status"
          fi

      - name: Record Docker signing status
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/docker-security
          cat > dist/docker-security/chancela-server-signing-status.json <<'JSON'
          {
            "image": "chancela-server:ci",
            "imagePushed": false,
            "signingPerformed": false,
            "notarizationPerformed": false,
            "attestationPerformed": false,
            "releaseTrust": {
              "mode": "local-ci",
              "imagePublication": {
                "status": "not_pushed",
                "reason": "This CI job loads the Docker image locally and does not push it to a registry."
              },
              "signing": {
                "status": "unsigned",
                "reason": "No container signing identity or signing step is configured in this workflow."
              },
              "notarization": {
                "status": "not_applicable",
                "reason": "This local CI container image is not a notarized desktop artifact."
              },
              "attestation": {
                "status": "not_attested",
                "reason": "No container image attestation step is configured in this workflow."
              }
            },
            "note": "This CI job builds and smokes a local Docker image only. It does not push, sign, attest, or notarize the image. Configure registry publishing and a signing identity before making a signed-image claim."
          }
          JSON
          echo "Docker image signing/notarization: not performed for the local CI image." >> "$GITHUB_STEP_SUMMARY"

      - name: Check Docker trust declaration
        run: node scripts/check-release-trust.mjs docker --input dist/docker-security/chancela-server-signing-status.json --expect-mode local-ci

      - name: Upload Docker security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chancela-docker-security-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/docker-security/
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------------
  # E2E: composed-system journeys that drive the REAL cargo-built
  # chancela-server binary over HTTP (crates/chancela-server/tests/**, gated
  # behind the `e2e` cargo feature). This is the layer every layer-isolated unit
  # test missed — the stale-server / SPA-static-fallback bug. The harness writes
  # its own synthetic web dist and spawns in-process axum registry/CAE fixtures,
  # so it needs no Node, no npm, and no apps/web build. It runs on Linux and
  # Windows for every push and PR.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (composed server, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # chancela-server's dependency tree does not link libpcsclite today, but
      # install it defensively (matching the rust job) so a future transitive
      # pcsc dep can't break the link step here.
      - name: Install PC/SC system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev pcscd

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run composed-system E2E journeys
        run: cargo test -p chancela-server --features e2e --locked

  # ---------------------------------------------------------------------------
  # Browser E2E core (Playwright, headless chromium): a normal PR/push gate for
  # the stable browser specs that prove the real built server + web bundle work
  # in Chromium. Edge and long-tail browser coverage remains in the labeled full
  # suite below.
  # ---------------------------------------------------------------------------
  browser-core:
    name: Browser E2E (Chromium core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The browser run builds the release chancela-server; keep the pcsc dep in
      # place for the same defensive reason as the e2e job.
      - name: Install PC/SC system deps (Linux)
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev pcscd

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Downloads the chromium browser + its OS deps into the Playwright cache.
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # Build the locked server + web dist, then run the stable core browser specs.
      - name: Run core browser E2E
        working-directory: apps/web
        run: |
          cargo build --release -p chancela-server --locked
          npm run build
          node e2e/run-playwright-with-cleanup-proof.mjs --project=chromium \
            e2e/smoke.spec.ts \
            e2e/session.spec.ts \
            e2e/first-launch-onboarding.spec.ts \
            e2e/journey.spec.ts

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Browser E2E full (Playwright, headless chromium): heavier edge/regression
  # coverage. It is blocking when selected, but it stays on the main branch and
  # PRs labeled `run-browser-tests` so the normal PR path is predictable.
  # ---------------------------------------------------------------------------
  browser-full:
    name: Browser E2E (Chromium full)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-browser-tests'))
    steps:
      - uses: actions/checkout@v4

      - name: Install PC/SC system deps (Linux)
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev pcscd

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run full browser E2E
        working-directory: apps/web
        run: |
          cargo build --release -p chancela-server --locked
          npm run build
          node e2e/run-playwright-with-cleanup-proof.mjs --project=chromium

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Live seam compile gates: compile the opt-in network/hardware test surfaces
  # without running them. These commands intentionally use --no-run so CI proves
  # live seams still build while avoiding real providers, networks, and readers.
  # ---------------------------------------------------------------------------
  live-seams:
    name: Live seam compile (no-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PC/SC system deps (Linux)
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev pcscd

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Compile live network and hardware test seams
        run: |
          cargo test -p chancela-cae --features network-tests --locked --no-run
          cargo test -p chancela-cmd --features network-tests --locked --no-run
          cargo test -p chancela-csc --features network-tests --locked --no-run
          cargo test -p chancela-law --features network-tests --locked --no-run
          cargo test -p chancela-registry --features network-tests --locked --no-run
          cargo test -p chancela-tsa --features network-tests --locked --no-run
          cargo test -p chancela-tsl --features network-tests --locked --no-run
          cargo test -p chancela-smartcard --features hardware-tests --locked --no-run

  # ---------------------------------------------------------------------------
  # Desktop Smoke (Tauri, Windows): builds the loose no-bundle desktop app and
  # drives its embedded server through the PowerShell smoke script. It is heavier
  # and Windows-specific, so it stays on the release-heavy path: push to main,
  # or PRs labeled `run-desktop-tests`.
  # ---------------------------------------------------------------------------
  desktop:
    name: Desktop Smoke (Windows)
    runs-on: windows-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-desktop-tests'))
    steps:
      - uses: actions/checkout@v4

      - name: Install native Perl for SQLCipher vendored OpenSSL
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install strawberryperl --version=5.40.4.1 --no-progress --yes

          $perlBin = 'C:\Strawberry\perl\bin'
          $cBin = 'C:\Strawberry\c\bin'
          if (-not (Test-Path (Join-Path $perlBin 'perl.exe'))) {
            throw "Pinned Strawberry Perl was not installed at $perlBin"
          }

          "$perlBin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          "$cBin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          "PERL=$perlBin\perl.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          $env:Path = "$perlBin;$cBin;$env:Path"
          perl -MConfig -e 'print qq(perl=$^X\narch=$Config{archname}\nversion=$]\n)'

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache desktop cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/desktop/package-lock.json

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci --no-audit --no-fund

      - name: Test desktop Rust
        working-directory: apps/desktop
        run: npm run test:rust

      - name: Build desktop no-bundle
        working-directory: apps/desktop
        run: npm run build:no-bundle

      - name: Run desktop smoke
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $ErrorActionPreference = 'Stop'
          $smokeRoot = Join-Path $env:RUNNER_TEMP 'chancela-desktop-smoke'
          $dataDir = Join-Path $smokeRoot 'data'
          $logDir = Join-Path $smokeRoot 'logs'
          New-Item -ItemType Directory -Path $dataDir, $logDir -Force | Out-Null

          Start-Transcript -Path (Join-Path $logDir 'desktop-smoke.log') -Force
          try {
            npm run test:smoke -- -DataDir $dataDir
            if ($LASTEXITCODE -ne 0) {
              throw "Desktop smoke failed with exit code $LASTEXITCODE"
            }
          } finally {
            Stop-Transcript
          }

      - name: Upload desktop smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/chancela-desktop-smoke/
            apps/desktop/src-tauri/target/release/*.exe
            apps/desktop/src-tauri/target/release/*.pdb
          if-no-files-found: ignore
          retention-days: 7

# Hardened bounded deployment profiles for chancela-server (ARC-40/41/42).
#
# Single node:
#   docker compose -f docker/docker-compose.yml --profile single-node up --build
#
# Server plus bounded validation-worker sidecar:
#   docker compose -f docker/docker-compose.yml --profile validation-worker up --build
#
# Security posture:
#   - read_only root filesystem, writable scratch via tmpfs only.
#   - all Linux capabilities dropped.
#   - no-new-privileges: process cannot gain privileges via setuid binaries.
#   - config injected via environment at runtime (never baked into the image).
name: chancela

services:
  server:
    profiles:
      - single-node
      - validation-worker
    build:
      # Context is the repo root so the Dockerfile can see the whole workspace.
      context: ..
      dockerfile: docker/Dockerfile.server
    image: ${CHANCELA_SERVER_IMAGE:-chancela-server:latest}
    # --- container hardening (ARC-41) ---
    user: "65532:65532"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      # Writable scratch space; the root filesystem stays read-only.
      - /tmp
    environment:
      # Bind on all interfaces inside the container (host maps the port below).
      CHANCELA_ADDR: 0.0.0.0:8080
      # Keep the server in durable mode; /health must report persistent: true.
      CHANCELA_DATA_DIR: /var/lib/chancela
    ports:
      - target: 8080
        published: "${CHANCELA_HOST_PORT:-8080}"
        host_ip: 127.0.0.1
    volumes:
      # Durable SQLite store plus JSON sidecars. The image creates this path as
      # the non-root runtime user so an empty named volume is writable.
      - chancela-data:/var/lib/chancela
    healthcheck:
      test: ["CMD", "/usr/bin/busybox", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  validation-worker:
    profiles:
      - validation-worker
    image: ${CHANCELA_SERVER_IMAGE:-chancela-server:latest}
    user: "65532:65532"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      # This sidecar intentionally reuses the current server image because no
      # dedicated worker image or worker entrypoint exists yet.
      CHANCELA_ADDR: 0.0.0.0:8081
      CHANCELA_DATA_DIR: /var/lib/chancela
      CHANCELA_DEPLOYMENT_ROLE: validation-worker-sidecar
    expose:
      - "8081"
    volumes:
      # Separate durable state avoids concurrent writes to the server store.
      - chancela-validation-worker-data:/var/lib/chancela
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/busybox", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

volumes:
  chancela-data:
  chancela-validation-worker-data:

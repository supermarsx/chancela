# Repo-root entry point for the deployment profiles in docker/docker-compose.yml.
#
# It exists so that a bare `docker compose build` / `docker compose up` works
# from the repo ROOT as well as from the `docker/` directory. Compose only
# auto-discovers a compose file in the current directory, and the real
# definitions live in docker/, so this file simply pulls them in.
#
#   docker compose up --build                        # single-node SQLite (default)
#   docker compose --profile postgres up -d --build  # Postgres + Redis
#   docker compose --profile single-node --profile worker up --build
#
# Profiles are two axes that compose: a BACKEND (`single-node` or `postgres`,
# each enabling exactly one app service) and additive SIDECARS (`worker`, which
# enables no app service of its own, so it runs against either backend).
#
# EVERY profile works from here, with no `-f` and no special casing. The default
# comes from COMPOSE_PROFILES=single-node in the committed `.env` next to this
# file (docker/.env is its twin for runs from docker/). A `--profile` on the
# command line REPLACES that value rather than adding to it, so the postgres
# profile starts `server-postgres` alone — `server-sqlite` stays down and the two
# never contend for ${CHANCELA_HOST_PORT:-8080}.
#
# There used to be a docker-compose.override.yml here (and one in docker/) that
# made `server` unconditional via `profiles: !reset []`. Because overrides
# auto-load but are suppressed by `-f`, a bare `--profile postgres up` started
# BOTH app services and the second died with "port is already allocated", while
# the same command with `-f docker/docker-compose.yml` worked. Both files are
# gone; `.env` gives the default without making any service unconditional.
#
# The postgres profile's three secrets need no preparation: they live in the
# chancela-secrets volume and are created on `up` by the secrets-init service
# (create-if-absent -- it never rotates an existing value). Files left in
# docker/secrets/ are adopted instead. See docs/deployment.md.
#
# `include` resolves the included file's relative paths (build context `..`,
# `./secrets`, `./secrets-init.sh`, `./postgres-tls-init.sh`) against docker/, so
# both invocation points produce the identical configuration.
#
# `name` is pinned here and in docker/docker-compose.yml so running from either
# directory targets the SAME project, containers, volumes and network — without
# it Compose would derive the project name from the current directory and
# silently create a second, parallel stack.
name: chancela

include:
  - path: docker/docker-compose.yml
